<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01 · Conceptos Básicos — Árboles · PRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amber:      #b35c00;
      --amber-dark: #7c3f00;
      --amber-lt:   #ffe0b2;
      --bg:         #fffde7;
      --panel:      #fff8e1;
      --text:       #3e2000;
      --ok:         #2e7d32;
      --bad:        #c62828;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .ex-header {
      background: linear-gradient(135deg, #3e2000, #5d3a00);
      color: #fff;
      padding: 1rem 1.5rem 1.1rem;
      border-bottom: 4px solid var(--amber);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .back-link {
      color: var(--amber-lt);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 0.7; }

    .ex-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.52rem, 2vw, 0.78rem);
      color: #ffe082;
      line-height: 1.8;
    }

    .ex-desc {
      font-size: 0.82rem;
      color: #ffcc80;
      line-height: 1.5;
      max-width: 64ch;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .ex-main {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 1.25rem;
      align-items: start;
    }

    /* ── Tree panel ──────────────────────────────────────────── */
    .tree-panel {
      background: var(--panel);
      border: 2px solid rgba(179,92,0,0.2);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 2px 12px rgba(179,92,0,0.07);
    }

    .panel-label {
      font-size: 0.7rem;
      color: #9e6a2a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #tree-svg {
      width: 100%;
      border-radius: 8px;
      background: #fffef5;
      border: 1px solid rgba(179,92,0,0.1);
    }

    /* ── Question panel ──────────────────────────────────────── */
    .q-panel {
      background: var(--panel);
      border: 2px solid rgba(179,92,0,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 2px 12px rgba(179,92,0,0.07);
      position: sticky;
      top: 1.25rem;
    }

    .q-concept {
      display: inline-block;
      background: var(--amber);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      padding: 0.3rem 0.65rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
      align-self: flex-start;
    }

    .q-text {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .q-def {
      font-size: 0.78rem;
      color: #7a4f1a;
      background: rgba(179,92,0,0.06);
      border-left: 3px solid var(--amber);
      padding: 0.55rem 0.75rem;
      border-radius: 0 4px 4px 0;
      line-height: 1.6;
    }

    /* ── Choices ─────────────────────────────────────────────── */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    .choice-btn {
      padding: 0.65rem 0.5rem;
      border: 2px solid rgba(179,92,0,0.25);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      text-align: center;
    }
    .choice-btn:hover:not(:disabled) {
      background: rgba(179,92,0,0.08);
      border-color: var(--amber);
      transform: translateY(-2px);
    }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.ok  { background: #e8f5e9; border-color: var(--ok);  color: var(--ok);  }
    .choice-btn.bad { background: #ffebee; border-color: var(--bad); color: var(--bad); }

    /* ── Feedback ────────────────────────────────────────────── */
    .feedback {
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 1.4em;
    }
    .feedback.ok  { color: var(--ok); }
    .feedback.bad { color: var(--bad); }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--amber);
      color: #fff;
    }

    .btn-outline {
      background: rgba(179,92,0,0.08);
      color: var(--amber-dark);
      border: 1.5px solid rgba(179,92,0,0.3);
      width: 100%;
    }

    /* ── Score footer ────────────────────────────────────────── */
    .score-bar {
      border-top: 2px solid rgba(179,92,0,0.15);
      background: rgba(255,253,231,0.95);
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--amber-dark);
    }

    .score-num {
      font-size: 1.1rem;
      color: var(--amber);
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 700px) {
      .ex-main { grid-template-columns: 1fr; padding: 1rem; }
      .q-panel { position: static; }
    }
  </style>
</head>
<body>

<header class="ex-header">
  <a class="back-link" href="../index.html#arboles">← Árboles</a>
  <h1 class="ex-title">01 — Conceptos Básicos</h1>
  <p class="ex-desc">Identifica la altura, profundidad, hojas, grado y distancia en árboles generados aleatoriamente.</p>
</header>

<main class="ex-main">

  <section class="tree-panel" aria-label="Árbol">
    <p class="panel-label">Árbol generado</p>
    <svg id="tree-svg" viewBox="0 0 560 280" role="img" aria-label="Árbol aleatorio"></svg>
    <button class="btn btn-outline" id="btn-new-tree">🌴 Nuevo árbol</button>
  </section>

  <section class="q-panel" aria-label="Pregunta">
    <span class="q-concept" id="q-concept">—</span>
    <p class="q-text" id="q-text"></p>
    <p class="q-def" id="q-def"></p>
    <div class="choices" id="choices" role="group" aria-label="Opciones de respuesta"></div>
    <p class="feedback" id="feedback" aria-live="polite"></p>
    <button class="btn btn-primary" id="btn-next" style="display:none">Siguiente pregunta →</button>
  </section>

</main>

<footer class="score-bar" aria-label="Puntuación">
  Correctas: <span class="score-num" id="score-ok">0</span> / <span id="score-total">0</span>
</footer>

<script>
(function () {
  'use strict';

  /* ── Constants ────────────────────────────────────────────── */
  var SVG_W = 560;
  var SVG_H = 280;
  var R     = 18;
  var NS    = 'http://www.w3.org/2000/svg';

  /* ── State ────────────────────────────────────────────────── */
  var tree      = [];
  var currentQ  = null;
  var answered  = false;
  var scoreOk   = 0;
  var scoreAll  = 0;

  /* ── Util ─────────────────────────────────────────────────── */
  function rand(a, b) {
    return Math.floor(Math.random() * (b - a + 1)) + a;
  }

  /* ── Tree algorithms ──────────────────────────────────────── */
  function depth(nodes, id) {
    var d = 0, cur = id;
    while (nodes[cur].parent !== null) { cur = nodes[cur].parent; d++; }
    return d;
  }

  function height(nodes) {
    var max = 0;
    for (var i = 0; i < nodes.length; i++) {
      var d = depth(nodes, i);
      if (d > max) max = d;
    }
    return max;
  }

  function leaves(nodes) {
    return nodes.filter(function (n) { return n.children.length === 0; });
  }

  function lca(nodes, a, b) {
    var anc = new Set();
    var cur = a;
    while (cur !== null) { anc.add(cur); cur = nodes[cur].parent; }
    cur = b;
    while (!anc.has(cur)) cur = nodes[cur].parent;
    return cur;
  }

  function pathBetween(nodes, a, b) {
    var L   = lca(nodes, a, b);
    var up  = [];
    var cur = a;
    while (cur !== L) { up.push(cur); cur = nodes[cur].parent; }
    up.push(L);
    cur = b;
    var down = [];
    while (cur !== L) { down.push(cur); cur = nodes[cur].parent; }
    return up.concat(down);
  }

  function dist(nodes, a, b) {
    var L = lca(nodes, a, b);
    return depth(nodes, a) + depth(nodes, b) - 2 * depth(nodes, L);
  }

  /* ── Tree generation ──────────────────────────────────────── */
  function generateTree() {
    var n         = rand(7, 10);
    var MAX_CH    = 3;
    var MAX_DEPTH = 3;

    var nodes = [];
    for (var i = 0; i < n; i++) {
      nodes.push({ id: i, label: String.fromCharCode(65 + i), parent: null, children: [], x: 0, y: 0 });
    }

    var eligible = [0];

    for (var i = 1; i < n; i++) {
      if (!eligible.length) {
        eligible = nodes.slice(0, i).map(function (nd) { return nd.id; });
      }
      var pid = eligible[rand(0, eligible.length - 1)];
      nodes[i].parent = pid;
      nodes[pid].children.push(i);

      if (depth(nodes, i) < MAX_DEPTH) eligible.push(i);
      if (nodes[pid].children.length >= MAX_CH) {
        eligible = eligible.filter(function (id) { return id !== pid; });
      }
    }

    return nodes;
  }

  /* ── Layout ───────────────────────────────────────────────── */
  function computeLayout(nodes) {
    function leafW(id) {
      if (!nodes[id].children.length) return 1;
      return nodes[id].children.reduce(function (s, c) { return s + leafW(c); }, 0);
    }

    var h      = height(nodes);
    var levelH = h === 0 ? 0 : (SVG_H - 50) / h;
    var pad    = R + 8;

    function assign(id, x0, x1) {
      nodes[id].x = (x0 + x1) / 2;
      nodes[id].y = 28 + depth(nodes, id) * levelH;
      var total = leafW(id);
      var xc    = x0;
      nodes[id].children.forEach(function (c) {
        var share = (x1 - x0) * (leafW(c) / total);
        assign(c, xc, xc + share);
        xc += share;
      });
    }

    assign(0, pad, SVG_W - pad);
  }

  /* ── SVG render ───────────────────────────────────────────── */
  function renderTree(nodes, hl) {
    hl = hl || [];
    var svg  = document.getElementById('tree-svg');
    svg.innerHTML = '';
    var hSet = new Set(hl);

    nodes.forEach(function (nd) {
      if (nd.parent === null) return;
      var par      = nodes[nd.parent];
      var isHLedge = hSet.has(nd.id) && hSet.has(nd.parent);
      var line     = document.createElementNS(NS, 'line');
      line.setAttribute('x1', par.x); line.setAttribute('y1', par.y);
      line.setAttribute('x2', nd.x);  line.setAttribute('y2', nd.y);
      line.setAttribute('stroke',       isHLedge ? '#b35c00' : '#c8b89a');
      line.setAttribute('stroke-width', isHLedge ? '3.5' : '2');
      svg.appendChild(line);
    });

    nodes.forEach(function (nd) {
      var isH  = hSet.has(nd.id);
      var g    = document.createElementNS(NS, 'g');
      var circ = document.createElementNS(NS, 'circle');
      circ.setAttribute('cx', nd.x);  circ.setAttribute('cy', nd.y);
      circ.setAttribute('r', R);
      circ.setAttribute('fill',         isH ? '#b35c00' : '#fff8e1');
      circ.setAttribute('stroke',       isH ? '#5d3a00' : '#8d6e63');
      circ.setAttribute('stroke-width', '2.5');

      var txt = document.createElementNS(NS, 'text');
      txt.setAttribute('x', nd.x);    txt.setAttribute('y', nd.y + 5);
      txt.setAttribute('text-anchor',    'middle');
      txt.setAttribute('font-size',      '14');
      txt.setAttribute('font-family',    'Space Grotesk, sans-serif');
      txt.setAttribute('font-weight',    '700');
      txt.setAttribute('fill',           isH ? '#fff' : '#3e2000');
      txt.setAttribute('pointer-events', 'none');
      txt.textContent = nd.label;

      g.appendChild(circ);
      g.appendChild(txt);
      svg.appendChild(g);
    });
  }

  /* ── Options ──────────────────────────────────────────────── */
  function makeOptions(correct, min, max) {
    var pool  = new Set([correct]);
    var cands = [];
    for (var v = Math.max(min, correct - 3); v <= Math.min(max, correct + 4); v++) {
      if (v !== correct) cands.push(v);
    }
    for (var i = cands.length - 1; i > 0; i--) {
      var j = rand(0, i);
      var tmp = cands[i]; cands[i] = cands[j]; cands[j] = tmp;
    }
    cands.forEach(function (c) { if (pool.size < 4) pool.add(c); });
    var off = 1;
    while (pool.size < 4) {
      var v = correct + off;
      if (v >= 0 && !pool.has(v)) pool.add(v);
      off++;
    }
    return Array.from(pool).sort(function (a, b) { return a - b; });
  }

  /* ── Question generation ──────────────────────────────────── */
  var TYPES = ['height', 'depth', 'leaves', 'degree', 'distance'];

  function generateQuestion(nodes) {
    var type = TYPES[rand(0, TYPES.length - 1)];
    var h    = height(nodes);

    switch (type) {

      case 'height':
        return {
          concept: 'Altura',
          text:    '¿Cuál es la <b>altura</b> del árbol?',
          def:     'Número de aristas en el camino más largo desde la raíz hasta una hoja. La altura de un árbol de un solo nodo es 0.',
          correct: h,
          hl:      [],
          opts:    makeOptions(h, 0, h + 3)
        };

      case 'depth': {
        var nd = nodes[rand(0, nodes.length - 1)];
        var d  = depth(nodes, nd.id);
        return {
          concept: 'Profundidad',
          text:    '¿Cuál es la <b>profundidad</b> del nodo <b>' + nd.label + '</b>?',
          def:     'Número de aristas desde la raíz hasta el nodo. La raíz tiene profundidad 0.',
          correct: d,
          hl:      [nd.id],
          opts:    makeOptions(d, 0, h + 1)
        };
      }

      case 'leaves': {
        var ls = leaves(nodes);
        return {
          concept: 'Hojas',
          text:    '¿Cuántos nodos <b>hoja</b> tiene el árbol?',
          def:     'Un nodo es hoja si no tiene hijos. Los nodos hoja están resaltados en el árbol.',
          correct: ls.length,
          hl:      ls.map(function (n) { return n.id; }),
          opts:    makeOptions(ls.length, 1, nodes.length)
        };
      }

      case 'degree': {
        var nd  = nodes[rand(0, nodes.length - 1)];
        var deg = nd.children.length;
        return {
          concept: 'Grado',
          text:    '¿Cuál es el <b>grado</b> del nodo <b>' + nd.label + '</b>?',
          def:     'El grado de un nodo es su número de hijos directos. El nodo y sus hijos están resaltados.',
          correct: deg,
          hl:      [nd.id].concat(nd.children),
          opts:    makeOptions(deg, 0, 4)
        };
      }

      case 'distance': {
        var a = rand(0, nodes.length - 1);
        var b;
        do { b = rand(0, nodes.length - 1); } while (b === a);
        var d    = dist(nodes, a, b);
        var path = pathBetween(nodes, a, b);
        return {
          concept: 'Distancia',
          text:    '¿Cuál es la <b>distancia</b> entre <b>' + nodes[a].label + '</b> y <b>' + nodes[b].label + '</b>?',
          def:     'Número de aristas en el camino que une los dos nodos. El camino completo está resaltado.',
          correct: d,
          hl:      path,
          opts:    makeOptions(d, 1, Math.max(d + 3, h + 2))
        };
      }
    }
  }

  /* ── Render question ──────────────────────────────────────── */
  function renderQuestion(q) {
    document.getElementById('q-concept').textContent = q.concept;
    document.getElementById('q-text').innerHTML      = q.text;
    document.getElementById('q-def').textContent     = q.def;

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.opts.forEach(function (opt) {
      var btn = document.createElement('button');
      btn.className   = 'choice-btn';
      btn.textContent = opt;
      btn.addEventListener('click', function () { handleAnswer(opt, q.correct); });
      choicesEl.appendChild(btn);
    });

    var fb = document.getElementById('feedback');
    fb.textContent = '';
    fb.className   = 'feedback';
    document.getElementById('btn-next').style.display = 'none';
    answered = false;
  }

  /* ── Answer ───────────────────────────────────────────────── */
  function handleAnswer(chosen, correct) {
    if (answered) return;
    answered = true;
    scoreAll++;

    document.querySelectorAll('.choice-btn').forEach(function (btn) {
      btn.disabled = true;
      var v = Number(btn.textContent);
      if (v === correct) btn.classList.add('ok');
      else if (v === chosen) btn.classList.add('bad');
    });

    var fb = document.getElementById('feedback');
    if (chosen === correct) {
      scoreOk++;
      fb.textContent = '¡Correcto! 🍌';
      fb.className   = 'feedback ok';
    } else {
      fb.textContent = 'Incorrecto — la respuesta es ' + correct + '.';
      fb.className   = 'feedback bad';
    }

    document.getElementById('btn-next').style.display = '';
    document.getElementById('score-ok').textContent    = scoreOk;
    document.getElementById('score-total').textContent = scoreAll;
  }

  /* ── Events ───────────────────────────────────────────────── */
  document.getElementById('btn-next').addEventListener('click', function () {
    currentQ = generateQuestion(tree);
    renderTree(tree, currentQ.hl);
    renderQuestion(currentQ);
  });

  document.getElementById('btn-new-tree').addEventListener('click', function () {
    tree     = generateTree();
    computeLayout(tree);
    currentQ = generateQuestion(tree);
    renderTree(tree, currentQ.hl);
    renderQuestion(currentQ);
  });

  /* ── Boot ─────────────────────────────────────────────────── */
  tree     = generateTree();
  computeLayout(tree);
  currentQ = generateQuestion(tree);
  renderTree(tree, currentQ.hl);
  renderQuestion(currentQ);

}());
</script>
</body>
</html>
