<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 · Construye la Matriz — Grafos · PRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="grafos.css" />
  <style>
    .matrix-panel { padding: 1.5rem; position: sticky; top: 1.25rem; }

    .mode-row { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }

    .mode-sel {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 0.82rem; font-weight: 700;
      padding: 0.3rem 0.65rem;
      border: 1.5px solid rgba(26,35,126,0.3); border-radius: 6px;
      background: #fff; color: var(--indigo-dark);
      cursor: pointer; transition: border-color 0.12s;
    }
    .mode-sel:focus { outline: none; border-color: var(--indigo); }

    .mode-note {
      font-size: 0.77rem; color: #5c6bc0; line-height: 1.55;
      background: rgba(26,35,126,0.04);
      border-left: 3px solid var(--indigo-lt);
      padding: 0.4rem 0.65rem; border-radius: 0 4px 4px 0;
    }

    .matrix-wrap { overflow-x: auto; }

    table.adj-matrix {
      border-collapse: separate; border-spacing: 3px; margin: 0 auto;
    }
    table.adj-matrix th {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem; font-weight: 700; color: var(--indigo-dark);
      text-align: center; width: 46px; height: 46px;
    }
    table.adj-matrix th.corner { color: #9fa8da; font-size: 0.8rem; }

    td.mcell {
      width: 46px; height: 46px; border-radius: 6px;
      border: 2px solid rgba(26,35,126,0.18);
      background: #fff; text-align: center; vertical-align: middle;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      color: #bdbdbd; transition: background 0.1s, border-color 0.1s, color 0.1s;
      user-select: none;
    }
    td.mcell:hover:not(.diagonal):not(.checked-ok) {
      background: rgba(26,35,126,0.07); border-color: var(--indigo);
    }
    td.mcell.filled {
      color: var(--indigo-dark); background: rgba(26,35,126,0.08);
      border-color: rgba(26,35,126,0.35);
    }
    td.mcell.diagonal {
      background: #e8eaf6; color: #9fa8da; cursor: default; border-color: transparent;
    }
    td.mcell.checked-ok {
      background: #e8f5e9; border-color: var(--ok); color: var(--ok); cursor: default;
    }
    td.mcell.checked-wrong {
      background: #ffebee; border-color: var(--bad); color: var(--bad);
    }

    #weight-picker {
      position: fixed; z-index: 200;
      background: #fff; border: 2px solid var(--indigo); border-radius: 8px;
      padding: 0.4rem; box-shadow: 0 4px 20px rgba(26,35,126,0.18);
      display: none; gap: 3px; flex-wrap: wrap; width: 126px;
    }
    #weight-picker.visible { display: flex; }
    .wp-btn {
      width: 32px; height: 32px;
      border: 1.5px solid rgba(26,35,126,0.2); border-radius: 5px;
      background: #f4f5fb; color: var(--indigo-dark);
      font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: background 0.09s;
    }
    .wp-btn:hover { background: rgba(26,35,126,0.14); }
    .wp-btn.wp-zero { color: #9fa8da; }

    @media (max-width: 700px) {
      .matrix-panel { position: static; }
      td.mcell, table.adj-matrix th { width: 40px; height: 40px; }
      td.mcell { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header class="ex-header">
  <a class="back-link" href="../index.html#grafos">← Grafos</a>
  <h1 class="ex-title">02 — CONSTRUYE LA MATRIZ</h1>
  <p class="ex-desc">Rellena la matriz de adyacencia correspondiente al grafo mostrado. Cambia el modo para practicar con grafos no dirigidos, dirigidos y ponderados.</p>
</header>

<main class="ex-main">

  <section class="graph-panel" aria-label="Grafo">
    <div class="mode-row">
      <label class="panel-label" for="mode-sel" style="white-space:nowrap">Modo</label>
      <select class="mode-sel" id="mode-sel">
        <option value="undirected">No dirigido</option>
        <option value="directed">Dirigido</option>
        <option value="weighted">Ponderado (dirigido)</option>
      </select>
    </div>
    <svg id="graph-svg" class="graph-svg" viewBox="0 0 480 300"
         role="img" aria-label="Grafo"></svg>
    <p class="mode-note" id="mode-note"></p>
    <button class="btn btn-outline" id="btn-new-graph">✦ Nuevo grafo</button>
  </section>

  <section class="matrix-panel q-panel" aria-label="Matriz de adyacencia">
    <span class="q-concept">Matriz</span>
    <p class="panel-label">Construye la matriz de adyacencia</p>
    <div class="matrix-wrap">
      <table class="adj-matrix" id="adj-matrix" aria-label="Matriz de adyacencia"></table>
    </div>
    <button class="btn btn-primary" id="btn-check">Comprobar →</button>
    <p class="feedback" id="feedback" aria-live="polite"></p>
    <button class="btn btn-outline" id="btn-next" hidden>✦ Nuevo grafo</button>
  </section>

</main>

<footer class="score-bar" aria-label="Puntuación">
  Rondas completadas: <span class="score-num" id="score-ok">0</span>
</footer>

<div id="weight-picker" role="dialog" aria-label="Selecciona el peso"></div>

<script>
(function () {
  'use strict';

  var SVG_W = 480, SVG_H = 300, R = 22;
  var NS = 'http://www.w3.org/2000/svg';
  var LABELS = ['A', 'B', 'C', 'D', 'E'];
  var N = 5;

  var mode = 'undirected';
  var graph = null, adjMatrix = null, userMatrix = null;
  var roundComplete = false, roundsCompleted = 0;
  var pickerTarget = null;

  /* ── Utils ─────────────────────────────────────────────────── */
  function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = rand(0, i), t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  /* ── Graph generation ──────────────────────────────────────── */
  function generateGraph() {
    var nodes = [], cx = SVG_W / 2, cy = SVG_H / 2 + 10, lr = 105;
    for (var i = 0; i < N; i++) {
      var a = (2 * Math.PI * i) / N - Math.PI / 2;
      nodes.push({ id: i, label: LABELS[i], x: cx + lr * Math.cos(a), y: cy + lr * Math.sin(a) });
    }

    var edges = [], added = new Set(), order = shuffle([0,1,2,3,4]);

    if (mode === 'undirected') {
      for (var i = 1; i < N; i++) {
        var u = order[rand(0,i-1)], v = order[i];
        var k = Math.min(u,v)+','+Math.max(u,v);
        if (!added.has(k)) { edges.push({from:u,to:v}); added.add(k); }
      }
      var ex = rand(1,3), att = 0;
      while (ex > 0 && att < 50) {
        var u = rand(0,N-1), v = rand(0,N-1);
        var k = Math.min(u,v)+','+Math.max(u,v);
        if (u !== v && !added.has(k)) { edges.push({from:u,to:v}); added.add(k); ex--; }
        att++;
      }
    } else {
      for (var i = 1; i < N; i++) {
        var u = order[rand(0,i-1)], v = order[i], k = u+','+v;
        if (!added.has(k)) {
          edges.push({from:u, to:v, weight: mode==='weighted' ? rand(1,9) : 1});
          added.add(k);
        }
      }
      var ex = rand(2,3), att = 0;
      while (ex > 0 && att < 60) {
        var u = rand(0,N-1), v = rand(0,N-1), k = u+','+v;
        if (u !== v && !added.has(k)) {
          edges.push({from:u, to:v, weight: mode==='weighted' ? rand(1,9) : 1});
          added.add(k); ex--;
        }
        att++;
      }
    }
    return { nodes: nodes, edges: edges };
  }

  function buildAdjMatrix(g) {
    var mat = [];
    for (var i = 0; i < N; i++) mat.push([0,0,0,0,0]);
    g.edges.forEach(function(e) {
      if (mode === 'undirected') { mat[e.from][e.to] = 1; mat[e.to][e.from] = 1; }
      else if (mode === 'directed') { mat[e.from][e.to] = 1; }
      else { mat[e.from][e.to] = e.weight; }
    });
    return mat;
  }

  /* ── SVG rendering ─────────────────────────────────────────── */
  function renderGraph(g) {
    var svg = document.getElementById('graph-svg');
    svg.innerHTML = '';
    var nodes = g.nodes, edges = g.edges;

    if (mode !== 'undirected') {
      var defs = document.createElementNS(NS,'defs');
      var mk = document.createElementNS(NS,'marker');
      mk.setAttribute('id','arr'); mk.setAttribute('markerWidth','7');
      mk.setAttribute('markerHeight','5'); mk.setAttribute('refX','6');
      mk.setAttribute('refY','2.5'); mk.setAttribute('orient','auto');
      var poly = document.createElementNS(NS,'polygon');
      poly.setAttribute('points','0 0, 7 2.5, 0 5'); poly.setAttribute('fill','#3949ab');
      mk.appendChild(poly); defs.appendChild(mk); svg.appendChild(defs);
    }

    var edgeSet = new Set();
    edges.forEach(function(e) { edgeSet.add(e.from+','+e.to); });

    var wLabels = [];

    edges.forEach(function(e) {
      var fn = nodes[e.from], tn = nodes[e.to];
      var dx = tn.x-fn.x, dy = tn.y-fn.y, dist = Math.sqrt(dx*dx+dy*dy);
      if (!dist) return;
      var ux = dx/dist, uy = dy/dist;

      if (mode === 'undirected') {
        var line = document.createElementNS(NS,'line');
        line.setAttribute('x1', fn.x+ux*R); line.setAttribute('y1', fn.y+uy*R);
        line.setAttribute('x2', tn.x-ux*R); line.setAttribute('y2', tn.y-uy*R);
        line.setAttribute('stroke','#3949ab'); line.setAttribute('stroke-width','2.5');
        svg.appendChild(line);
      } else {
        var mutual = edgeSet.has(e.to+','+e.from), el;
        if (mutual) {
          var mx=(fn.x+tn.x)/2, my=(fn.y+tn.y)/2;
          var cpx=mx+uy*26, cpy=my-ux*26;
          var d0x=cpx-fn.x, d0y=cpy-fn.y, d0l=Math.sqrt(d0x*d0x+d0y*d0y);
          var d1x=tn.x-cpx, d1y=tn.y-cpy, d1l=Math.sqrt(d1x*d1x+d1y*d1y);
          el = document.createElementNS(NS,'path');
          el.setAttribute('d',
            'M '+(fn.x+(d0x/d0l)*(R+2))+','+(fn.y+(d0y/d0l)*(R+2))+
            ' Q '+cpx+','+cpy+
            ' '+(tn.x-(d1x/d1l)*(R+7))+','+(tn.y-(d1y/d1l)*(R+7)));
          el.setAttribute('fill','none');
          if (mode === 'weighted') {
            var t=0.5;
            wLabels.push({
              x: (1-t)*(1-t)*(fn.x+(d0x/d0l)*(R+2))+2*(1-t)*t*cpx+t*t*(tn.x-(d1x/d1l)*(R+7)),
              y: (1-t)*(1-t)*(fn.y+(d0y/d0l)*(R+2))+2*(1-t)*t*cpy+t*t*(tn.y-(d1y/d1l)*(R+7)),
              w: e.weight
            });
          }
        } else {
          el = document.createElementNS(NS,'line');
          el.setAttribute('x1', fn.x+ux*(R+2)); el.setAttribute('y1', fn.y+uy*(R+2));
          el.setAttribute('x2', tn.x-ux*(R+7)); el.setAttribute('y2', tn.y-uy*(R+7));
          if (mode === 'weighted') {
            wLabels.push({
              x: (fn.x+ux*(R+2)+tn.x-ux*(R+7))/2,
              y: (fn.y+uy*(R+2)+tn.y-uy*(R+7))/2,
              w: e.weight
            });
          }
        }
        el.setAttribute('stroke','#3949ab'); el.setAttribute('stroke-width','2');
        el.setAttribute('marker-end','url(#arr)'); svg.appendChild(el);
      }
    });

    wLabels.forEach(function(lb) { renderWLabel(svg, lb.x, lb.y, lb.w); });

    nodes.forEach(function(nd) {
      var g2 = document.createElementNS(NS,'g');
      var c = document.createElementNS(NS,'circle');
      c.setAttribute('cx',nd.x); c.setAttribute('cy',nd.y); c.setAttribute('r',R);
      c.setAttribute('fill','#e8eaf6'); c.setAttribute('stroke','#1a237e');
      c.setAttribute('stroke-width','2.5');
      var t = document.createElementNS(NS,'text');
      t.setAttribute('x',nd.x); t.setAttribute('y',nd.y+5);
      t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','14');
      t.setAttribute('font-family','Space Grotesk, sans-serif');
      t.setAttribute('font-weight','700'); t.setAttribute('fill','#1a237e');
      t.setAttribute('pointer-events','none'); t.textContent = nd.label;
      g2.appendChild(c); g2.appendChild(t); svg.appendChild(g2);
    });
  }

  function renderWLabel(svg, x, y, w) {
    var bg = document.createElementNS(NS,'rect');
    bg.setAttribute('x',x-9); bg.setAttribute('y',y-9);
    bg.setAttribute('width','18'); bg.setAttribute('height','18');
    bg.setAttribute('rx','4'); bg.setAttribute('fill','#283593');
    svg.appendChild(bg);
    var t = document.createElementNS(NS,'text');
    t.setAttribute('x',x); t.setAttribute('y',y+5); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','11'); t.setAttribute('font-family','Space Grotesk, sans-serif');
    t.setAttribute('font-weight','700'); t.setAttribute('fill','#fff');
    t.setAttribute('pointer-events','none'); t.textContent = String(w);
    svg.appendChild(t);
  }

  /* ── Matrix UI ─────────────────────────────────────────────── */
  function buildMatrixUI() {
    var table = document.getElementById('adj-matrix');
    table.innerHTML = '';

    var thead = document.createElement('thead');
    var hrow = document.createElement('tr');
    var corner = document.createElement('th');
    corner.className = 'corner';
    corner.textContent = mode === 'undirected' ? '↔' : '→';
    hrow.appendChild(corner);
    for (var j = 0; j < N; j++) {
      var th = document.createElement('th'); th.textContent = LABELS[j]; hrow.appendChild(th);
    }
    thead.appendChild(hrow); table.appendChild(thead);

    var tbody = document.createElement('tbody');
    for (var i = 0; i < N; i++) {
      var row = document.createElement('tr');
      var rh = document.createElement('th'); rh.textContent = LABELS[i]; row.appendChild(rh);
      for (var j = 0; j < N; j++) {
        var td = document.createElement('td');
        td.className = 'mcell';
        td.setAttribute('data-i', i); td.setAttribute('data-j', j);
        if (i === j) { td.classList.add('diagonal'); td.textContent = '—'; }
        else { td.textContent = '0'; td.addEventListener('click', onCellClick); }
        row.appendChild(td);
      }
      tbody.appendChild(row);
    }
    table.appendChild(tbody);

    userMatrix = [];
    for (var i = 0; i < N; i++) userMatrix.push([0,0,0,0,0]);
  }

  function getCell(i, j) {
    return document.querySelector('[data-i="'+i+'"][data-j="'+j+'"]');
  }

  function setCellValue(i, j, val) {
    userMatrix[i][j] = val;
    var td = getCell(i, j); if (!td) return;
    td.textContent = String(val);
    td.classList.toggle('filled', val !== 0);
  }

  function onCellClick(ev) {
    if (this.classList.contains('checked-ok')) return;
    var i = parseInt(this.getAttribute('data-i'));
    var j = parseInt(this.getAttribute('data-j'));
    this.classList.remove('checked-wrong');
    if (mode === 'undirected') {
      var mirror = getCell(j, i); if (mirror) mirror.classList.remove('checked-wrong');
    }
    if (mode === 'weighted') {
      openPicker(i, j, ev);
    } else {
      var val = userMatrix[i][j] === 0 ? 1 : 0;
      setCellValue(i, j, val);
      if (mode === 'undirected') setCellValue(j, i, val);
    }
  }

  /* ── Weight picker ─────────────────────────────────────────── */
  function openPicker(i, j, ev) {
    pickerTarget = {i:i, j:j};
    var picker = document.getElementById('weight-picker');
    picker.innerHTML = '';
    for (var w = 0; w <= 9; w++) {
      var btn = document.createElement('button');
      btn.className = 'wp-btn' + (w===0?' wp-zero':'');
      btn.textContent = String(w); btn.setAttribute('data-w', w);
      btn.addEventListener('click', onPickWeight);
      picker.appendChild(btn);
    }
    var rect = getCell(i, j).getBoundingClientRect();
    picker.style.top  = (rect.bottom + 4) + 'px';
    picker.style.left = rect.left + 'px';
    picker.classList.add('visible');
    if (ev) ev.stopPropagation();
  }

  function onPickWeight(ev) {
    var w = parseInt(this.getAttribute('data-w'));
    if (pickerTarget) setCellValue(pickerTarget.i, pickerTarget.j, w);
    closePicker(); ev.stopPropagation();
  }

  function closePicker() {
    document.getElementById('weight-picker').classList.remove('visible');
    pickerTarget = null;
  }
  document.addEventListener('click', closePicker);

  /* ── Check ─────────────────────────────────────────────────── */
  function checkMatrix() {
    if (roundComplete) return;
    closePicker();
    var wrongCount = 0;
    for (var i = 0; i < N; i++) {
      for (var j = 0; j < N; j++) {
        if (i === j) continue;
        var td = getCell(i, j);
        if (td.classList.contains('checked-ok')) continue;
        if (String(userMatrix[i][j]) === String(adjMatrix[i][j])) {
          td.classList.add('checked-ok'); td.classList.remove('checked-wrong','filled');
        } else {
          td.classList.add('checked-wrong'); wrongCount++;
        }
      }
    }

    var fb = document.getElementById('feedback');
    var panel = document.querySelector('.matrix-panel');

    if (wrongCount === 0) {
      roundComplete = true; roundsCompleted++;
      fb.textContent = '¡Perfecto! Ronda completada.';
      fb.className = 'feedback ok';
      document.getElementById('btn-next').hidden = false;
      document.getElementById('btn-check').disabled = true;
      document.getElementById('score-ok').textContent = roundsCompleted;
      panel.classList.add('panel-flash-ok');
      setTimeout(function(){ panel.classList.remove('panel-flash-ok'); }, 700);
    } else {
      fb.textContent = wrongCount + ' celda'+(wrongCount>1?'s':'')+' incorrecta'+(wrongCount>1?'s':'')+'.';
      fb.className = 'feedback bad';
      panel.classList.add('panel-flash-bad');
      setTimeout(function(){
        panel.classList.remove('panel-flash-bad');
        document.querySelectorAll('.checked-wrong').forEach(function(td){
          td.classList.remove('checked-wrong');
        });
      }, 1400);
    }
  }

  /* ── New graph ─────────────────────────────────────────────── */
  var MODE_NOTES = {
    undirected: 'Grafo no dirigido — la arista (u,v) implica también (v,u). Al marcar una celda se marca su simétrica automáticamente.',
    directed:   'Grafo dirigido — cada arista tiene una dirección. La matriz puede no ser simétrica.',
    weighted:   'Grafo ponderado (dirigido) — las aristas tienen un peso ≥ 1. Las celdas sin arista valen 0.'
  };

  function newGraph() {
    roundComplete = false;
    graph = generateGraph();
    adjMatrix = buildAdjMatrix(graph);
    renderGraph(graph);
    buildMatrixUI();
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('btn-next').hidden = true;
    document.getElementById('btn-check').disabled = false;
  }

  /* ── Events ────────────────────────────────────────────────── */
  document.getElementById('mode-sel').addEventListener('change', function() {
    mode = this.value;
    document.getElementById('mode-note').textContent = MODE_NOTES[mode];
    newGraph();
  });
  document.getElementById('btn-new-graph').addEventListener('click', newGraph);
  document.getElementById('btn-check').addEventListener('click', checkMatrix);
  document.getElementById('btn-next').addEventListener('click', newGraph);

  /* ── Boot ──────────────────────────────────────────────────── */
  document.getElementById('mode-note').textContent = MODE_NOTES[mode];
  newGraph();
}());
</script>
</body>
</html>
