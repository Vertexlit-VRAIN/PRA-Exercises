    :root {

    body {

    }

        transparent 2px,
        rgba(0, 200, 50, 0.04) 2px,
        rgba(0, 200, 50, 0.04) 3px

      padding: 1rem 1.5rem 1.1rem;

      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .back-link {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      transition: opacity 0.15s;

    .ex-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.78rem, 2.5vw, 1.05rem);
      color: #00cc44;
      text-shadow: 0 0 14px rgba(0, 204, 68, 0.45);
      line-height: 1.6;
    }

    .ex-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.5;
      max-width: 64ch;
    }

    /* ── Placeholder ─────────────────────────────────────────── */
    .ex-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .terminal-block {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      color: var(--green);
      line-height: 2.4;
      text-align: left;
    }

    .terminal-block .dim { color: rgba(27, 94, 32, 0.45); }

    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.1em;
      background: var(--green-lt);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
