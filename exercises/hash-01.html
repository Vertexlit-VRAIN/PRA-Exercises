<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01 · Direccionamiento Abierto — Tablas Hash · PRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:      #1b5e20;
      --green-lt:   #4caf50;
      --green-glow: #00cc44;
      --bg:         #f0fff4;
      --panel:      #e8f5e9;
      --text:       #0d1f0d;
      --ok:         #2e7d32;
      --bad:        #c62828;
      --terminal:   #001a0a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg);
      background-image: linear-gradient(180deg, var(--terminal) 0px, transparent 320px);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────── */
    .ex-header {
      background-color: var(--terminal);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,200,50,0.07) 2px, rgba(0,200,50,0.07) 3px
      );
      color: #fff;
      padding: 1rem 1.5rem 1.1rem;
      border-bottom: 1px solid rgba(0,200,50,0.15);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .back-link {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 0.7; }
    .ex-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.78rem, 2.5vw, 1.05rem);
      color: #00cc44;
      text-shadow: 0 0 14px rgba(0,204,68,0.45);
      line-height: 1.6;
    }
    .ex-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
    }

    /* ── Layout ──────────────────────────────────────────── */
    .ex-main {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 1.5rem;
      align-items: start;
    }
    .left-panel  { display: flex; flex-direction: column; gap: 1rem; }
    .right-panel { display: flex; flex-direction: column; gap: 0.75rem; position: sticky; top: 1.25rem; }

    /* ── Round badge ─────────────────────────────────────── */
    .round-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--green-glow);
      letter-spacing: 0.08em;
      background: rgba(0,204,68,0.07);
      border: 1px solid rgba(0,204,68,0.2);
      border-radius: 4px;
      padding: 0.25rem 0.65rem;
      align-self: flex-start;
    }

    /* ── Key card ────────────────────────────────────────── */
    .key-card {
      background: var(--panel);
      border: 1px solid rgba(0,130,40,0.2);
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .key-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: #4a7a42;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .key-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 3.5rem;
      line-height: 1;
      color: var(--green-glow);
      text-shadow: 0 0 16px rgba(0,204,68,0.35);
      letter-spacing: 0.05em;
    }
    .key-formula {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.88rem;
      color: #3a7a34;
      margin-top: 0.1rem;
    }

    /* ── Progress dots ───────────────────────────────────── */
    .progress-dots { display: flex; gap: 0.45rem; justify-content: center; }
    .dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      border: 2px solid rgba(0,130,40,0.25);
      background: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .dot.done    { background: var(--green-lt); border-color: var(--green-lt); }
    .dot.current { border-color: var(--green-glow); background: rgba(0,204,68,0.15); }

    /* ── Instruction & feedback ──────────────────────────── */
    .instr-text {
      font-size: 0.88rem;
      color: #2a5c24;
      line-height: 1.65;
      background: rgba(0,130,40,0.05);
      border-left: 3px solid var(--green-lt);
      padding: 0.6rem 0.8rem;
      border-radius: 0 4px 4px 0;
    }
    .feedback { font-size: 0.85rem; font-weight: 700; min-height: 1.4em; line-height: 1.55; }
    .feedback.ok  { color: var(--ok); }
    .feedback.bad { color: var(--bad); }

    /* ── Round result ────────────────────────────────────── */
    .round-result {
      display: none;
      background: rgba(0,204,68,0.06);
      border: 1px solid rgba(0,204,68,0.2);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      flex-direction: column;
      gap: 0.3rem;
    }
    .round-result.visible { display: flex; }
    .result-line { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--green); }
    .result-line strong { color: var(--green-glow); font-size: 1.05rem; }

    /* ── Button ──────────────────────────────────────────── */
    .btn {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      align-self: flex-start;
    }
    .btn:hover  { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--green); color: #fff; }

    /* ── Right panel ─────────────────────────────────────── */
    .table-card {
      background: var(--panel);
      border: 1px solid rgba(0,130,40,0.2);
      border-radius: 8px;
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .panel-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: #4a7a42;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Hash table ──────────────────────────────────────── */
    .hash-table { display: flex; flex-direction: column; gap: 0.3rem; }

    .ht-row {
      display: flex;
      align-items: stretch;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      border: 1.5px dashed rgba(0,130,40,0.22);
      background: #fff;
      min-height: 3rem;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .ht-row:hover:not(.filled) {
      border-color: var(--green-lt);
      border-style: solid;
      background: rgba(0,204,68,0.05);
    }
    .ht-row.filled {
      border-style: solid;
      border-color: rgba(0,130,40,0.3);
      cursor: default;
    }
    .ht-row.flash-ok  { animation: flash-ok  0.5s ease-out; }
    .ht-row.flash-bad { animation: flash-bad 0.4s ease-out; }

    .ht-idx {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      padding: 0 0.5rem;
      background: rgba(0,130,40,0.07);
      border-right: 1px solid rgba(0,130,40,0.12);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--green);
      flex-shrink: 0;
    }
    .ht-val {
      display: flex;
      align-items: center;
      padding: 0 0.8rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }
    .ht-val.empty { color: rgba(0,130,40,0.22); font-size: 0.9rem; }
    .ht-val .placed { animation: pop-in 0.35s ease-out; }

    /* ── Score footer ────────────────────────────────────── */
    .score-bar {
      border-top: 2px solid rgba(0,130,40,0.12);
      background: rgba(232,245,233,0.95);
      padding: 0.65rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--green);
    }
    .score-num { font-size: 1.4rem; font-weight: 700; color: var(--green-glow); }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes flash-ok {
      0%, 100% { background: #fff; }
      40%       { background: rgba(46,125,50,0.15); border-color: var(--ok); border-style: solid; }
    }
    @keyframes flash-bad {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
    @keyframes pop-in {
      0%   { transform: scale(1.4); opacity: 0.3; }
      65%  { transform: scale(0.93); }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 720px) {
      .ex-main { grid-template-columns: 1fr; padding: 1rem; }
      .right-panel { position: static; }
    }
  </style>
</head>
<body>

<header class="ex-header">
  <a class="back-link" href="../index.html#hash">← Tablas Hash</a>
  <h1 class="ex-title">01 — Direccionamiento Abierto</h1>
  <p class="ex-desc">// h(k) = k mod m &nbsp;·&nbsp; colisión → (h(k) + i) mod m</p>
</header>

<main class="ex-main">

  <section class="left-panel" aria-label="Clave actual y controles">

    <div class="round-badge" id="round-badge">Ronda 1</div>

    <div class="key-card">
      <span class="key-label">Clave a insertar</span>
      <span class="key-value"  id="key-value">—</span>
      <span class="key-formula" id="key-formula">h(k) = k mod m</span>
    </div>

    <div class="progress-dots" id="progress-dots" aria-label="Progreso de la ronda"></div>

    <p class="instr-text" id="instr-text">
      Clica la celda donde debe insertarse la clave.
    </p>

    <p class="feedback" id="feedback" aria-live="polite"></p>

    <div class="round-result" id="round-result">
      <p class="result-line" id="result-line-1"></p>
      <p class="result-line" id="result-line-2"></p>
    </div>

    <button class="btn btn-primary" id="btn-next" hidden>Nueva tabla →</button>

  </section>

  <aside class="right-panel" aria-label="Tabla hash">
    <div class="table-card">
      <p class="panel-label" id="m-label">Tabla hash</p>
      <div class="hash-table" id="hash-table" role="grid"
           aria-label="Celdas de la tabla hash"></div>
    </div>
  </aside>

</main>

<footer class="score-bar" aria-label="Puntuación global">
  Correctas a la primera: <span class="score-num" id="score-ok">0</span>
  / <span id="score-total">0</span>
</footer>

<script>
(function () {
  'use strict';

  /* ── Global score ───────────────────────────────────────── */
  var gOk = 0, gTotal = 0;

  /* ── Round state ────────────────────────────────────────── */
  var round    = null;  // { m, keys, table, keyIdx, roundOk }
  var roundNum = 0;
  var attempts = 0;     // wrong clicks on current key

  /* ── DOM ────────────────────────────────────────────────── */
  var $badge    = document.getElementById('round-badge');
  var $keyVal   = document.getElementById('key-value');
  var $formula  = document.getElementById('key-formula');
  var $dots     = document.getElementById('progress-dots');
  var $instr    = document.getElementById('instr-text');
  var $fb       = document.getElementById('feedback');
  var $result   = document.getElementById('round-result');
  var $res1     = document.getElementById('result-line-1');
  var $res2     = document.getElementById('result-line-2');
  var $btn      = document.getElementById('btn-next');
  var $mLabel   = document.getElementById('m-label');
  var $table    = document.getElementById('hash-table');
  var $scoreOk  = document.getElementById('score-ok');
  var $scoreAll = document.getElementById('score-total');

  /* ── Util ───────────────────────────────────────────────── */
  function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

  /* Returns the first free slot for key using linear probing. */
  function targetSlot(table, m, key) {
    var h = key % m, s = h;
    for (var i = 0; i < m; i++) {
      if (table[s] === null) return s;
      s = (s + 1) % m;
    }
    return -1;
  }

  /* Returns the probing path: [h(k), h(k)+1, ..., free_slot]. */
  function probePath(table, m, key) {
    var h = key % m, s = h, path = [];
    for (var i = 0; i < m; i++) {
      path.push(s);
      if (table[s] === null) break;
      s = (s + 1) % m;
    }
    return path;
  }

  /* ── Key generation ─────────────────────────────────────── */
  function generateRound() {
    var mOpts = [5, 7, 8, 9, 11];
    var m     = mOpts[rand(0, mOpts.length - 1)];
    var count = 5 + rand(0, 1);
    var keys  = buildKeys(m, count);
    return { m: m, keys: keys, table: new Array(m).fill(null), keyIdx: 0, roundOk: 0 };
  }

  function buildKeys(m, count) {
    var keys = [], used = new Set(), tries = 0;
    while (keys.length < count && tries++ < 400) {
      var k = rand(10, 99);
      if (!used.has(k)) { used.add(k); keys.push(k); }
    }

    /* Ensure at least 1 collision (hash-level, not just probe-level). */
    var sim = new Array(m).fill(null), hasCol = false;
    for (var i = 0; i < keys.length; i++) {
      var h = keys[i] % m;
      if (sim[h] !== null) hasCol = true;
      var s = h, p = 0;
      while (sim[s] !== null && p < m) { s = (s + 1) % m; p++; }
      if (p < m) sim[s] = keys[i];
    }

    if (!hasCol && keys.length >= 3) {
      var target = keys[0] % m;
      for (var d = m; d <= 89; d += m) {
        var c = target + d;
        if (c >= 10 && c <= 99 && !used.has(c)) {
          used.delete(keys[keys.length - 1]);
          keys[keys.length - 1] = c;
          break;
        }
      }
    }

    return keys;
  }

  /* ── Render ─────────────────────────────────────────────── */
  function renderTable() {
    $table.innerHTML = '';
    for (var i = 0; i < round.m; i++) {
      var row = document.createElement('div');
      row.className = 'ht-row' + (round.table[i] !== null ? ' filled' : '');
      row.dataset.idx = i;
      row.setAttribute('role', 'gridcell');
      row.setAttribute('aria-label',
        'Celda ' + i + (round.table[i] !== null ? ', contiene ' + round.table[i] : ', vacía'));

      var idx = document.createElement('div');
      idx.className = 'ht-idx';
      idx.textContent = i;

      var val = document.createElement('div');
      val.className = 'ht-val' + (round.table[i] === null ? ' empty' : '');
      val.textContent = round.table[i] !== null ? round.table[i] : '—';

      row.appendChild(idx);
      row.appendChild(val);
      $table.appendChild(row);
    }
  }

  function renderKey() {
    var k = round.keys[round.keyIdx];
    $keyVal.textContent  = k;
    $formula.textContent = 'h(k) = k mod ' + round.m;
    renderDots();
    clearFeedback();
  }

  function renderDots() {
    $dots.innerHTML = '';
    for (var i = 0; i < round.keys.length; i++) {
      var d = document.createElement('span');
      d.className = 'dot' + (i < round.keyIdx ? ' done' : i === round.keyIdx ? ' current' : '');
      d.setAttribute('aria-hidden', 'true');
      $dots.appendChild(d);
    }
  }

  /* ── Feedback helpers ───────────────────────────────────── */
  function setFb(text, type) {
    $fb.textContent = text;
    $fb.className   = 'feedback' + (type ? ' ' + type : '');
  }
  function clearFeedback() { $fb.textContent = ''; $fb.className = 'feedback'; }

  function flashRow(i, type) {
    var row = $table.querySelector('[data-idx="' + i + '"]');
    if (!row) return;
    row.classList.add('flash-' + type);
    setTimeout(function () { row.classList.remove('flash-' + type); }, 550);
  }

  /* ── Click handler ──────────────────────────────────────── */
  $table.addEventListener('click', function (e) {
    if (round.keyIdx >= round.keys.length) return;

    var row = e.target.closest('.ht-row');
    if (!row) return;

    var clicked = parseInt(row.dataset.idx, 10);
    var key     = round.keys[round.keyIdx];
    var correct = targetSlot(round.table, round.m, key);

    if (clicked === correct) {
      /* ─── Correct ─── */
      var wasFirst = (attempts === 0);
      attempts = 0;
      if (wasFirst) { round.roundOk++; gOk++; }
      gTotal++;

      var snapshotTable = round.table.slice(); // table before insertion
      round.table[correct] = key;

      /* Animate the new cell */
      renderTable();
      flashRow(correct, 'ok');
      var newRow = $table.querySelector('[data-idx="' + correct + '"]');
      if (newRow) {
        var span = document.createElement('span');
        span.className = 'placed';
        span.textContent = key;
        newRow.querySelector('.ht-val').innerHTML = '';
        newRow.querySelector('.ht-val').appendChild(span);
      }

      /* Build feedback message */
      var h    = key % round.m;
      var path = probePath(snapshotTable, round.m, key);
      var msg;
      if (correct === h) {
        msg = '✓  h(' + key + ') = ' + key + ' mod ' + round.m + ' = ' + h + ' — celda libre.';
      } else {
        var occupied = path.slice(0, -1);
        msg = '✓  Colisión en ' + occupied.join(' → ') + '. Sondeo: celda ' + correct + ' libre.';
      }
      setFb(msg, 'ok');

      /* Update global score */
      $scoreOk.textContent  = gOk;
      $scoreAll.textContent = gTotal;

      round.keyIdx++;
      if (round.keyIdx >= round.keys.length) {
        setTimeout(showRoundEnd, 900);
      } else {
        setTimeout(function () { renderKey(); }, 900);
      }

    } else {
      /* ─── Wrong ─── */
      attempts++;
      flashRow(clicked, 'bad');

      var h2    = key % round.m;
      var path2 = probePath(round.table, round.m, key);
      var dest  = path2[path2.length - 1];
      var msg2;

      if (round.table[clicked] !== null) {
        /* Clicked an occupied cell */
        msg2 = 'Celda ' + clicked + ' ya contiene ' + round.table[clicked] + '. ';
        if (dest === h2) {
          msg2 += 'h(' + key + ') = ' + h2 + ' está libre — la clave va allí.';
        } else {
          msg2 += 'h(' + key + ') = ' + h2 + ', ocupada. Sondeo: ' +
                  path2.slice(0, -1).join(' → ') + ' → celda ' + dest + ' libre.';
        }
      } else {
        /* Clicked the wrong free cell */
        msg2 = 'h(' + key + ') = ' + key + ' mod ' + round.m + ' = ' + h2 + '. ';
        if (dest === h2) {
          msg2 += 'La celda ' + h2 + ' está libre — la clave va allí directamente.';
        } else {
          msg2 += 'Colisión en ' + path2.slice(0, -1).join(' → ') +
                  '. Sondeo: la clave va a la celda ' + dest + '.';
        }
      }
      setFb(msg2, 'bad');
    }
  });

  /* ── Round end ──────────────────────────────────────────── */
  function showRoundEnd() {
    $keyVal.textContent  = '✓';
    $formula.textContent = 'Ronda completada';
    clearFeedback();

    var pct = Math.round(100 * round.roundOk / round.keys.length);
    $res1.innerHTML = 'A la primera: <strong>' + round.roundOk +
                      ' / ' + round.keys.length + '</strong> (' + pct + '%)';
    $res2.innerHTML = 'm = ' + round.m + ' &nbsp;·&nbsp; claves: ' + round.keys.join(', ');
    $result.classList.add('visible');
    $btn.hidden = false;
  }

  /* ── New round ──────────────────────────────────────────── */
  $btn.addEventListener('click', function () {
    $btn.hidden = true;
    $result.classList.remove('visible');
    startRound();
  });

  function startRound() {
    roundNum++;
    round    = generateRound();
    attempts = 0;
    $badge.textContent   = 'Ronda ' + roundNum;
    $mLabel.textContent  = 'Tabla hash  ·  m = ' + round.m;
    $instr.textContent   = 'Clica la celda donde debe insertarse la clave.';
    renderTable();
    renderKey();
  }

  /* ── Boot ───────────────────────────────────────────────── */
  startRound();

}());
</script>
</body>
</html>
