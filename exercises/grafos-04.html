<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 · Construye la Lista — Grafos · PRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="grafos.css" />
  <style>
    .list-panel { padding: 1.5rem; position: sticky; top: 1.25rem; }

    .mode-row { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }
    .mode-sel {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 0.82rem; font-weight: 700;
      padding: 0.3rem 0.65rem;
      border: 1.5px solid rgba(26,35,126,0.3); border-radius: 6px;
      background: #fff; color: var(--indigo-dark);
      cursor: pointer; transition: border-color 0.12s;
    }
    .mode-sel:focus { outline: none; border-color: var(--indigo); }

    .mode-note {
      font-size: 0.77rem; color: #5c6bc0; line-height: 1.55;
      background: rgba(26,35,126,0.04);
      border-left: 3px solid var(--indigo-lt);
      padding: 0.4rem 0.65rem; border-radius: 0 4px 4px 0;
    }

    /* Adjacency list rows */
    .adj-lists { display: flex; flex-direction: column; gap: 0.55rem; }

    .list-row {
      display: flex; align-items: flex-start; gap: 0.5rem; flex-wrap: wrap;
    }
    .list-node-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.92rem; font-weight: 700; color: var(--indigo-dark);
      background: #e8eaf6; border: 2px solid rgba(26,35,126,0.25);
      border-radius: 6px; padding: 0.25rem 0.6rem;
      min-width: 32px; text-align: center; flex-shrink: 0;
      line-height: 1.6;
    }

    .list-arrow {
      color: #9fa8da; font-size: 1rem; line-height: 2;
      flex-shrink: 0;
    }

    .chip-area {
      display: flex; flex-wrap: wrap; gap: 4px;
      min-height: 34px; flex: 1;
      border-bottom: 2px dashed rgba(26,35,126,0.15);
      padding-bottom: 4px;
    }

    /* Chips */
    .chip {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 20px;
      cursor: pointer; transition: background 0.1s, transform 0.08s;
      border: 2px solid transparent; user-select: none;
    }
    .chip:active { transform: scale(0.96); }

    /* Bank chip (available to add) */
    .chip-bank-item {
      background: #e8eaf6; color: var(--indigo-dark);
      border-color: rgba(26,35,126,0.2);
    }
    .chip-bank-item:hover { background: rgba(26,35,126,0.14); }

    /* Selected chip (added to list) */
    .chip-selected {
      background: var(--indigo); color: #fff;
      border-color: var(--indigo-dark);
    }
    .chip-selected:hover { background: var(--indigo-dark); }
    .chip-selected.ok  { background: var(--ok);  border-color: var(--ok); }
    .chip-selected.bad { background: var(--bad); border-color: var(--bad); }
    .chip-bank-item.missing { border-color: var(--bad); color: var(--bad); background: #ffebee; }

    /* Bank section */
    .bank-label {
      font-size: 0.72rem; color: #9fa8da; text-transform: uppercase;
      letter-spacing: 0.07em; font-weight: 700;
    }
    .chip-bank { display: flex; flex-wrap: wrap; gap: 4px; }

    /* Weight picker */
    #weight-picker {
      position: fixed; z-index: 200;
      background: #fff; border: 2px solid var(--indigo); border-radius: 8px;
      padding: 0.4rem; box-shadow: 0 4px 20px rgba(26,35,126,0.18);
      display: none; gap: 3px; flex-wrap: wrap; width: 126px;
    }
    #weight-picker.visible { display: flex; }
    .wp-btn {
      width: 32px; height: 32px;
      border: 1.5px solid rgba(26,35,126,0.2); border-radius: 5px;
      background: #f4f5fb; color: var(--indigo-dark);
      font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: background 0.09s;
    }
    .wp-btn:hover { background: rgba(26,35,126,0.14); }
    .wp-btn.wp-zero { color: #9fa8da; }

    @media (max-width: 700px) {
      .list-panel { position: static; }
    }
  </style>
</head>
<body>

<header class="ex-header">
  <a class="back-link" href="../index.html#grafos">← Grafos</a>
  <h1 class="ex-title">04 — CONSTRUYE LA LISTA</h1>
  <p class="ex-desc">Construye la lista de adyacencia del grafo mostrado. Haz clic en los chips para añadir o quitar vecinos de cada nodo.</p>
</header>

<main class="ex-main">

  <section class="graph-panel" aria-label="Grafo">
    <div class="mode-row">
      <label class="panel-label" for="mode-sel" style="white-space:nowrap">Modo</label>
      <select class="mode-sel" id="mode-sel">
        <option value="undirected">No dirigido</option>
        <option value="directed">Dirigido</option>
        <option value="weighted">Ponderado (dirigido)</option>
      </select>
    </div>
    <svg id="graph-svg" class="graph-svg" viewBox="0 0 480 300"
         role="img" aria-label="Grafo"></svg>
    <p class="mode-note" id="mode-note"></p>
    <button class="btn btn-outline" id="btn-new-graph">✦ Nuevo grafo</button>
  </section>

  <section class="list-panel q-panel" aria-label="Lista de adyacencia">
    <span class="q-concept">Lista</span>
    <p class="panel-label">Construye la lista de adyacencia</p>

    <div class="adj-lists" id="adj-lists"></div>

    <div style="margin-top:0.5rem">
      <p class="bank-label">Banco de nodos — haz clic para añadir a una lista</p>
    </div>
    <div class="chip-bank" id="chip-bank" aria-label="Banco de nodos disponibles"></div>

    <button class="btn btn-primary" id="btn-check">Comprobar →</button>
    <p class="feedback" id="feedback" aria-live="polite"></p>
    <button class="btn btn-outline" id="btn-next" hidden>✦ Nuevo grafo</button>
  </section>

</main>

<footer class="score-bar" aria-label="Puntuación">
  Rondas completadas: <span class="score-num" id="score-ok">0</span>
</footer>

<div id="weight-picker" role="dialog" aria-label="Selecciona el peso"></div>

<script>
(function () {
  'use strict';

  var SVG_W = 480, SVG_H = 300, R = 22;
  var NS = 'http://www.w3.org/2000/svg';
  var LABELS = ['A', 'B', 'C', 'D', 'E'];
  var N = 5;

  var mode = 'undirected';
  var graph = null;
  /* userAdj[i] = [{node: j, weight: w}] — what the user has added */
  var userAdj = null;
  /* correctAdj[i] = [{node: j, weight: w}] */
  var correctAdj = null;

  var activeRow = null; /* which row the bank is currently targeting */
  var pickerTarget = null; /* {row, node} for weight picker */
  var roundComplete = false, roundsCompleted = 0;

  /* ── Utils ─────────────────────────────────────────────────── */
  function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = rand(0, i), t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  /* ── Graph generation ──────────────────────────────────────── */
  function generateGraph() {
    var nodes = [], cx = SVG_W/2, cy = SVG_H/2+10, lr = 105;
    for (var i = 0; i < N; i++) {
      var a = (2*Math.PI*i)/N - Math.PI/2;
      nodes.push({id:i, label:LABELS[i], x:cx+lr*Math.cos(a), y:cy+lr*Math.sin(a)});
    }

    var edges = [], added = new Set(), order = shuffle([0,1,2,3,4]);

    if (mode === 'undirected') {
      for (var i = 1; i < N; i++) {
        var u = order[rand(0,i-1)], v = order[i];
        var k = Math.min(u,v)+','+Math.max(u,v);
        if (!added.has(k)) { edges.push({from:u,to:v}); added.add(k); }
      }
      var ex = rand(1,3), att = 0;
      while (ex > 0 && att < 50) {
        var u=rand(0,N-1), v=rand(0,N-1);
        var k = Math.min(u,v)+','+Math.max(u,v);
        if (u!==v && !added.has(k)) { edges.push({from:u,to:v}); added.add(k); ex--; }
        att++;
      }
    } else {
      for (var i = 1; i < N; i++) {
        var u=order[rand(0,i-1)], v=order[i], k=u+','+v;
        if (!added.has(k)) {
          edges.push({from:u,to:v, weight:mode==='weighted'?rand(1,9):1});
          added.add(k);
        }
      }
      var ex=rand(2,3), att=0;
      while (ex > 0 && att < 60) {
        var u=rand(0,N-1), v=rand(0,N-1), k=u+','+v;
        if (u!==v && !added.has(k)) {
          edges.push({from:u,to:v,weight:mode==='weighted'?rand(1,9):1});
          added.add(k); ex--;
        }
        att++;
      }
    }
    return {nodes:nodes, edges:edges};
  }

  function buildCorrectAdj(g) {
    var adj = [];
    for (var i = 0; i < N; i++) adj.push([]);
    g.edges.forEach(function(e) {
      if (mode === 'undirected') {
        adj[e.from].push({node:e.to, weight:1});
        adj[e.to].push({node:e.from, weight:1});
      } else if (mode === 'directed') {
        adj[e.from].push({node:e.to, weight:1});
      } else {
        adj[e.from].push({node:e.to, weight:e.weight});
      }
    });
    adj.forEach(function(list) { list.sort(function(a,b){return a.node-b.node;}); });
    return adj;
  }

  /* ── SVG rendering ─────────────────────────────────────────── */
  function renderGraph(g) {
    var svg = document.getElementById('graph-svg');
    svg.innerHTML = '';
    var nodes = g.nodes, edges = g.edges;

    if (mode !== 'undirected') {
      var defs = document.createElementNS(NS,'defs');
      var mk = document.createElementNS(NS,'marker');
      mk.setAttribute('id','arr'); mk.setAttribute('markerWidth','7');
      mk.setAttribute('markerHeight','5'); mk.setAttribute('refX','6');
      mk.setAttribute('refY','2.5'); mk.setAttribute('orient','auto');
      var poly = document.createElementNS(NS,'polygon');
      poly.setAttribute('points','0 0, 7 2.5, 0 5'); poly.setAttribute('fill','#3949ab');
      mk.appendChild(poly); defs.appendChild(mk); svg.appendChild(defs);
    }

    var edgeSet = new Set();
    edges.forEach(function(e) { edgeSet.add(e.from+','+e.to); });

    var wLabels = [];

    edges.forEach(function(e) {
      var fn=nodes[e.from], tn=nodes[e.to];
      var dx=tn.x-fn.x, dy=tn.y-fn.y, dist=Math.sqrt(dx*dx+dy*dy);
      if (!dist) return;
      var ux=dx/dist, uy=dy/dist;

      if (mode === 'undirected') {
        var line = document.createElementNS(NS,'line');
        line.setAttribute('x1',fn.x+ux*R); line.setAttribute('y1',fn.y+uy*R);
        line.setAttribute('x2',tn.x-ux*R); line.setAttribute('y2',tn.y-uy*R);
        line.setAttribute('stroke','#3949ab'); line.setAttribute('stroke-width','2.5');
        svg.appendChild(line);
      } else {
        var mutual = edgeSet.has(e.to+','+e.from), el;
        if (mutual) {
          var mx=(fn.x+tn.x)/2, my=(fn.y+tn.y)/2;
          var cpx=mx+uy*26, cpy=my-ux*26;
          var d0x=cpx-fn.x,d0y=cpy-fn.y,d0l=Math.sqrt(d0x*d0x+d0y*d0y);
          var d1x=tn.x-cpx,d1y=tn.y-cpy,d1l=Math.sqrt(d1x*d1x+d1y*d1y);
          el = document.createElementNS(NS,'path');
          el.setAttribute('d',
            'M '+(fn.x+(d0x/d0l)*(R+2))+','+(fn.y+(d0y/d0l)*(R+2))+
            ' Q '+cpx+','+cpy+
            ' '+(tn.x-(d1x/d1l)*(R+7))+','+(tn.y-(d1y/d1l)*(R+7)));
          el.setAttribute('fill','none');
          if (mode==='weighted') {
            var t=0.5;
            wLabels.push({
              x: (1-t)*(1-t)*(fn.x+(d0x/d0l)*(R+2))+2*(1-t)*t*cpx+t*t*(tn.x-(d1x/d1l)*(R+7)),
              y: (1-t)*(1-t)*(fn.y+(d0y/d0l)*(R+2))+2*(1-t)*t*cpy+t*t*(tn.y-(d1y/d1l)*(R+7)),
              w: e.weight
            });
          }
        } else {
          el = document.createElementNS(NS,'line');
          el.setAttribute('x1',fn.x+ux*(R+2)); el.setAttribute('y1',fn.y+uy*(R+2));
          el.setAttribute('x2',tn.x-ux*(R+7)); el.setAttribute('y2',tn.y-uy*(R+7));
          if (mode==='weighted') {
            wLabels.push({
              x: (fn.x+ux*(R+2)+tn.x-ux*(R+7))/2,
              y: (fn.y+uy*(R+2)+tn.y-uy*(R+7))/2,
              w: e.weight
            });
          }
        }
        el.setAttribute('stroke','#3949ab'); el.setAttribute('stroke-width','2');
        el.setAttribute('marker-end','url(#arr)'); svg.appendChild(el);
      }
    });

    wLabels.forEach(function(lb) { renderWLabel(svg, lb.x, lb.y, lb.w); });

    nodes.forEach(function(nd) {
      var g2=document.createElementNS(NS,'g');
      var c=document.createElementNS(NS,'circle');
      c.setAttribute('cx',nd.x); c.setAttribute('cy',nd.y); c.setAttribute('r',R);
      c.setAttribute('fill','#e8eaf6'); c.setAttribute('stroke','#1a237e'); c.setAttribute('stroke-width','2.5');
      var t=document.createElementNS(NS,'text');
      t.setAttribute('x',nd.x); t.setAttribute('y',nd.y+5); t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','14'); t.setAttribute('font-family','Space Grotesk, sans-serif');
      t.setAttribute('font-weight','700'); t.setAttribute('fill','#1a237e');
      t.setAttribute('pointer-events','none'); t.textContent = nd.label;
      g2.appendChild(c); g2.appendChild(t); svg.appendChild(g2);
    });
  }

  function renderWLabel(svg,x,y,w) {
    var bg=document.createElementNS(NS,'rect');
    bg.setAttribute('x',x-9); bg.setAttribute('y',y-9);
    bg.setAttribute('width','18'); bg.setAttribute('height','18');
    bg.setAttribute('rx','4'); bg.setAttribute('fill','#283593');
    svg.appendChild(bg);
    var t=document.createElementNS(NS,'text');
    t.setAttribute('x',x); t.setAttribute('y',y+5); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','11'); t.setAttribute('font-family','Space Grotesk, sans-serif');
    t.setAttribute('font-weight','700'); t.setAttribute('fill','#fff');
    t.setAttribute('pointer-events','none'); t.textContent=String(w);
    svg.appendChild(t);
  }

  /* ── List UI ───────────────────────────────────────────────── */
  function buildListUI() {
    activeRow = null;
    userAdj = [];
    for (var i = 0; i < N; i++) userAdj.push([]);

    var listsEl = document.getElementById('adj-lists');
    listsEl.innerHTML = '';

    for (var i = 0; i < N; i++) {
      (function(row) {
        var div = document.createElement('div');
        div.className = 'list-row';
        div.setAttribute('data-row', row);

        var lbl = document.createElement('span');
        lbl.className = 'list-node-label';
        lbl.textContent = LABELS[row];
        div.appendChild(lbl);

        var arrow = document.createElement('span');
        arrow.className = 'list-arrow';
        arrow.textContent = '→';
        div.appendChild(arrow);

        var area = document.createElement('div');
        area.className = 'chip-area';
        area.setAttribute('data-area', row);
        area.setAttribute('role', 'list');
        area.setAttribute('aria-label', 'Vecinos del nodo '+LABELS[row]);
        div.appendChild(area);

        listsEl.appendChild(div);

        /* Click on row activates bank for this row */
        div.addEventListener('click', function(ev) {
          if (ev.target.closest('.chip-selected')) return;
          setActiveRow(row);
        });
      })(i);
    }

    buildBank();
    setActiveRow(0);
  }

  function setActiveRow(row) {
    activeRow = row;
    document.querySelectorAll('.list-row').forEach(function(r) {
      var isActive = parseInt(r.getAttribute('data-row')) === row;
      r.style.background = isActive ? 'rgba(26,35,126,0.04)' : '';
      r.style.borderRadius = isActive ? '6px' : '';
    });
  }

  function buildBank() {
    var bankEl = document.getElementById('chip-bank');
    bankEl.innerHTML = '';
    for (var j = 0; j < N; j++) {
      (function(node) {
        var chip = document.createElement('button');
        chip.className = 'chip chip-bank-item';
        chip.textContent = LABELS[node];
        chip.setAttribute('data-node', node);
        chip.setAttribute('aria-label', 'Añadir nodo '+LABELS[node]+' a la lista activa');
        chip.addEventListener('click', function(ev) {
          ev.stopPropagation();
          if (activeRow === null || activeRow === node) return;
          if (roundComplete) return;
          /* Check not already added */
          var already = userAdj[activeRow].some(function(e){ return e.node === node; });
          if (already) return;
          if (mode === 'weighted') {
            openPicker(activeRow, node, ev);
          } else {
            addToList(activeRow, node, 1);
          }
        });
        bankEl.appendChild(chip);
      })(j);
    }
  }

  function addToList(row, node, weight) {
    userAdj[row].push({node:node, weight:weight});
    userAdj[row].sort(function(a,b){return a.node-b.node;});
    refreshArea(row);
  }

  function removeFromList(row, node) {
    userAdj[row] = userAdj[row].filter(function(e){ return e.node !== node; });
    refreshArea(row);
  }

  function refreshArea(row) {
    var area = document.querySelector('[data-area="'+row+'"]');
    if (!area) return;
    area.innerHTML = '';
    userAdj[row].forEach(function(entry) {
      (function(e) {
        var chip = document.createElement('button');
        chip.className = 'chip chip-selected';
        var label = mode === 'weighted'
          ? LABELS[e.node] + '(' + e.weight + ')'
          : LABELS[e.node];
        chip.textContent = label;
        chip.setAttribute('title', 'Clic para eliminar');
        chip.addEventListener('click', function(ev) {
          ev.stopPropagation();
          if (roundComplete) return;
          chip.classList.remove('ok','bad');
          removeFromList(row, e.node);
        });
        area.appendChild(chip);
      })(entry);
    });
  }

  /* ── Weight picker ─────────────────────────────────────────── */
  function openPicker(row, node, ev) {
    pickerTarget = {row:row, node:node};
    var picker = document.getElementById('weight-picker');
    picker.innerHTML = '';
    for (var w = 1; w <= 9; w++) {
      var btn = document.createElement('button');
      btn.className = 'wp-btn'; btn.textContent = String(w);
      btn.setAttribute('data-w', w);
      btn.addEventListener('click', onPickWeight);
      picker.appendChild(btn);
    }
    var rect = ev.target.getBoundingClientRect();
    picker.style.top = (rect.bottom+4)+'px';
    picker.style.left = rect.left+'px';
    picker.classList.add('visible');
    ev.stopPropagation();
  }

  function onPickWeight(ev) {
    var w = parseInt(this.getAttribute('data-w'));
    if (pickerTarget) addToList(pickerTarget.row, pickerTarget.node, w);
    closePicker(); ev.stopPropagation();
  }

  function closePicker() {
    document.getElementById('weight-picker').classList.remove('visible');
    pickerTarget = null;
  }
  document.addEventListener('click', closePicker);

  /* ── Check ─────────────────────────────────────────────────── */
  function checkList() {
    if (roundComplete) return;
    closePicker();

    var totalWrong = 0;

    for (var i = 0; i < N; i++) {
      var area = document.querySelector('[data-area="'+i+'"]');
      var correct = correctAdj[i];
      var user = userAdj[i];

      /* Mark existing chips ok/bad */
      var chips = area.querySelectorAll('.chip-selected');
      chips.forEach(function(chip) {
        var label = chip.textContent;
        var nodeLabel = mode === 'weighted' ? label.split('(')[0] : label;
        var nodeIdx = LABELS.indexOf(nodeLabel);
        var weight = mode === 'weighted' ? parseInt(label.split('(')[1]) : 1;

        var isCorrect = correct.some(function(e){
          return e.node === nodeIdx && (mode !== 'weighted' || e.weight === weight);
        });

        chip.classList.remove('ok','bad');
        chip.classList.add(isCorrect ? 'ok' : 'bad');
        if (!isCorrect) totalWrong++;
      });

      /* Mark missing nodes in bank */
      var bankChips = document.querySelectorAll('#chip-bank .chip-bank-item');
      bankChips.forEach(function(bc){ bc.classList.remove('missing'); });

      correct.forEach(function(e) {
        var inUser = user.some(function(u){ return u.node === e.node; });
        if (!inUser) {
          totalWrong++;
          var bc = document.querySelector('#chip-bank [data-node="'+e.node+'"]');
          if (bc) bc.classList.add('missing');
        }
      });
    }

    var fb = document.getElementById('feedback');
    var panel = document.querySelector('.list-panel');

    if (totalWrong === 0) {
      roundComplete = true; roundsCompleted++;
      fb.textContent = '¡Perfecto! Ronda completada.';
      fb.className = 'feedback ok';
      document.getElementById('btn-next').hidden = false;
      document.getElementById('btn-check').disabled = true;
      document.getElementById('score-ok').textContent = roundsCompleted;
      panel.classList.add('panel-flash-ok');
      setTimeout(function(){ panel.classList.remove('panel-flash-ok'); }, 700);
    } else {
      fb.textContent = totalWrong + ' error'+(totalWrong>1?'es':'')+'. Los chips en rojo están mal; los del banco en rojo faltan.';
      fb.className = 'feedback bad';
      panel.classList.add('panel-flash-bad');
      setTimeout(function(){
        panel.classList.remove('panel-flash-bad');
        document.querySelectorAll('.chip-selected.bad').forEach(function(c){ c.classList.remove('bad'); });
        document.querySelectorAll('.chip-bank-item.missing').forEach(function(c){ c.classList.remove('missing'); });
      }, 2000);
    }
  }

  /* ── New graph ─────────────────────────────────────────────── */
  var MODE_NOTES = {
    undirected: 'Grafo no dirigido — cada arista aparece en las listas de ambos extremos.',
    directed:   'Grafo dirigido — cada nodo lista solo sus vecinos de salida.',
    weighted:   'Grafo ponderado — selecciona el peso al añadir cada vecino.'
  };

  function newGraph() {
    roundComplete = false;
    graph = generateGraph();
    correctAdj = buildCorrectAdj(graph);
    renderGraph(graph);
    buildListUI();
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('btn-next').hidden = true;
    document.getElementById('btn-check').disabled = false;
  }

  /* ── Events ────────────────────────────────────────────────── */
  document.getElementById('mode-sel').addEventListener('change', function() {
    mode = this.value;
    document.getElementById('mode-note').textContent = MODE_NOTES[mode];
    newGraph();
  });
  document.getElementById('btn-new-graph').addEventListener('click', newGraph);
  document.getElementById('btn-check').addEventListener('click', checkList);
  document.getElementById('btn-next').addEventListener('click', newGraph);

  /* ── Boot ──────────────────────────────────────────────────── */
  document.getElementById('mode-note').textContent = MODE_NOTES[mode];
  newGraph();
}());
</script>
</body>
</html>
